<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daemi Group - Agent Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agent Portal - Daemi Group</h1>
        <img src="https://oklahomainsures.com/wp-content/uploads/2020/02/logo-1.jpg" alt="Daemi Group Logo" class="header-logo">
        <nav>
            <ul>
                <li><a href="index.html">Login</a></li>
                <li><a href="policy.html">Customer Policies</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="agent-form-section">
            <h2>Add/Update Customer Account Information</h2>
            <form class="agent-form">
                <div class="form-group">
                    <label for="customer-id">Customer ID:</label>
                    <input type="text" id="customer-id" name="customer-id" required>
                </div>
                <div class="form-group">
                    <label for="policy-number">Policy Number (optional):</label>
                    <input type="text" id="policy-number" name="policy-number">
                </div>
                <div class="form-group">
                    <label for="new-info">Information to Add/Update:</label>
                    <textarea id="new-info" name="new-info" rows="5" required></textarea>
                </div>
                <button type="submit">Submit Information</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Daemi Group</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
